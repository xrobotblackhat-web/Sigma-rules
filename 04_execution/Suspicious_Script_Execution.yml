title: Suspicious Batch or Script File Execution
id: 2c3d4e5f-6a7b-8c9d-0e1f-2a3b4c5d6e7f
status: experimental
description: |
  Detects execution of .bat, .cmd, .ps1, .vbs, .js, or .hta files from unusual locations.
  Medusa frequently uses batch files for automation.
references:
  - https://www.fbi.gov/file-repository/cyber-alerts/stopransomware-medusa-ransomware-031225.pdf/view
author: Detection Engineering Team
date: 2026-06-29
logsource:
  product: windows
  service: sysmon
detection:
  selection:
    EventID: 1
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
    CommandLine|contains|any:
      - '.bat'
      - '.cmd'
      - '.ps1'
      - '.vbs'
      - '.js'
      - '.hta'
    CommandLine|contains:
      - 'C:\Users\'
      - 'C:\ProgramData\'
      - 'C:\Windows\Temp\'
  condition: selection
falsepositives:
  - Legitimate script execution from user directories.
level: medium
tags:
  - attack.t1059
  - ransomware.medusa
