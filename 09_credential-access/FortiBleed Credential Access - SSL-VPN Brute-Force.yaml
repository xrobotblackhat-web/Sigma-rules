title: FortiBleed Credential Access - SSL-VPN Brute-Force
id: b2c3d4e5-f6a7-8901-bcde-f23456789012
status: experimental
description: Detects high-volume failed authentication attempts against FortiGate SSL-VPN, consistent with FortiBleed's credential stuffing and brute-force operations. The campaign launched approximately 1.16 billion authentication attempts against over 320,000 targets.
author: Detection Engineering Team
date: 2026-06-27
references:
  - https://cybelangel.com/blog/fortibleed-6-things-to-know/
  - https://www.csoonline.com/article/4186790/fortibleed-campaign-exposes-75000-fortinet-firewalls-worldwide.html
tags:
  - attack.credential_access
  - attack.t1110
  - attack.t1110.001
  - campaign.fortibleed
logsource:
  category: vpn
  product: fortigate
detection:
  selection:
    event_type: "vpn"
    action: "failed"
  timeframe: 5m
  condition: selection | count() by source_ip > 20
falsepositives:
  - Users with forgotten passwords
  - Misconfigured VPN clients
level: high