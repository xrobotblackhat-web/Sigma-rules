title: Remote Desktop Connection via MSTSC
id: c3d4e5f6-a7b8-9c0d-e1f2-345678901234
status: experimental
description: |
  Detects use of mstsc.exe to initiate an RDP session, often used for lateral movement.
references:
  - https://attack.mitre.org/techniques/T1021.001/
author: Detection Engineering Team
date: 2026-06-29
logsource:
  product: windows
  service: sysmon
detection:
  selection:
    EventID: 1
    Image|endswith: '\mstsc.exe'
    CommandLine|contains: '/v:'
  condition: selection
falsepositives:
  - Administrative remote access.
level: medium
tags:
  - attack.t1021.001
  - ransomware.medusa
