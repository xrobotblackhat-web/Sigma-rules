title: FortiBleed - Configuration Export After Login
id: f6a7b8c9-d0e1-2345-fghi-678901234567
status: experimental
description: Detects configuration export or backup download following a successful login. FortiBleed attackers systematically extracted configuration backup files from compromised devices to crack password hashes offline.
author: Detection Engineering Team
date: 2026-06-27
references:
  - https://labs.cloudsecurityalliance.org/research/csa-research-note-fortibleed-default-credentials-20260620-cs/
  - https://www.csa.gov.sg/alerts-and-advisories/advisories/ad-2026-007/
tags:
  - attack.collection
  - attack.t1005
  - attack.t1530
  - campaign.fortibleed
logsource:
  category: firewall
  product: fortigate
detection:
  selection:
    message|contains:
      - "config"
      - "configuration"
      - "backup"
      - "export"
  selection_action:
    message|contains:
      - "download"
      - "exported"
      - "backup created"
  condition: selection and selection_action
falsepositives:
  - Authorized administrative backups
  - Scheduled configuration exports
level: high